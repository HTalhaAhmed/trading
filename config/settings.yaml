# MT5 Alert-Only Decision-Support Bot
# =====================================
# IMPORTANT: trade_enabled is FALSE by default.
# This bot NEVER auto-executes trades.
# The bot analyzes and alerts. YOU make the final execution decision.

broker:
  mode: mt5
  trade_enabled: false
  alert_only: true
  watchlist:
    - XAUUSD
    - EURUSD
    - GBPUSD
    - USDJPY
    - XAGUSD
  polling_interval_seconds: 30

risk_limits:
  max_trades_per_symbol_per_day: 5
  max_trades_per_session: 2
  min_minutes_between_trades: 20
  max_open_positions_per_symbol: 1
  max_open_positions_total: 2

scanner:
  only_a_plus: true
  top_n_setups: 3
  require_trending_market_first: true
  min_adx: 20
  max_spread_atr_ratio: 0.30

logging:
  log_dir: output/logs
  log_scan_results: true
  log_alerts: true
  log_blocked: true

sessions:
  london_start_utc: "07:00"
  london_end_utc: "16:00"
  newyork_start_utc: "12:00"
  newyork_end_utc: "21:00"

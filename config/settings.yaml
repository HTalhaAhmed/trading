project:
  symbol: XAUUSD
  starting_equity: 10000
  timezone: UTC

data:
  timeframe: 1min
  required_columns: [timestamp, open, high, low, close, volume]

execution:
  spread_points: 0.25
  slippage_points: 0.10

sessions:
  trade_hours_utc: [7, 16]  # inclusive start, exclusive end

risk:
  risk_per_trade: 0.005
  daily_max_loss_pct: 0.03
  max_consecutive_losses: 3
  max_open_positions: 1
  contract_value_per_point: 1.0

regime:
  trend_adx_threshold: 22
  range_adx_threshold: 18
  high_vol_atr_threshold: 1.8

strategy:
  trend:
    ema_fast: 20
    ema_slow: 50
    pullback_ema: 20
    stop_atr_mult: 1.5
    take_profit_r: 1.5
  range:
    rsi_overbought: 70
    rsi_oversold: 30
    stop_atr_mult: 1.2
    take_profit_r: 1.2

news:
  enabled: true
  blackout_pre_minutes: 15
  blackout_post_minutes: 15
  impacts: [high]
